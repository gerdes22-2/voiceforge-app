services:
  # The FastAPI Backend Service
  - type: web
    name: voiceforge-api
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voiceforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: voiceforge-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: voiceforge-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: voiceforge-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_PROVIDER
        value: "s3"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: "voiceforge"
      - key: S3_REGION_NAME
        value: "auto"

  # The Celery Worker for AI Tasks
  - type: worker
    name: voiceforge-worker
    env: docker
    dockerfilePath: worker/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voiceforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: voiceforge-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: voiceforge-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: voiceforge-redis
          property: connectionString
      - key: STORAGE_PROVIDER
        value: "s3"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: "voiceforge"
      - key: S3_REGION_NAME
        value: "auto"

  # Redis instance for Celery
  - type: redis
    name: voiceforge-redis
    ipAllowList: []
    plan: starter

databases:
  # The PostgreSQL Database
  - name: voiceforge-db
    databaseName: voiceforge
    user: db_user
    plan: starter
