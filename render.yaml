services:
  # The FastAPI Backend + Celery Worker (Combined for Free Tier)
  - type: web
    name: voiceforge-api
    env: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: REDIS_URL
        sync: false 
      - key: CELERY_BROKER_URL
        sync: false 
      - key: CELERY_RESULT_BACKEND
        sync: false 
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_PROVIDER
        value: "s3"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: "voiceforge" 
      - key: S3_REGION_NAME
        value: "auto"
