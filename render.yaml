services:
  # The FastAPI Backend + Celery Worker (Combined for Free Tier)
  - type: web
    name: voiceforge-api
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false # Provide your Supabase / Neon connection string here
      - key: REDIS_URL
        sync: false # Provide your Upstash Redis connection string here
      - key: CELERY_BROKER_URL
        sync: false # Same as REDIS_URL
      - key: CELERY_RESULT_BACKEND
        sync: false # Same as REDIS_URL
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_PROVIDER
        value: "s3"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: "voiceforge" # Change this if your bucket has a different name
      - key: S3_REGION_NAME
        value: "auto"
